name: CI Assistant

on:
  # Trigger on CI failure
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

  # Trigger on PR events
  pull_request:
    types: [opened, synchronize]

jobs:
  notify-on-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch failure logs
        id: logs
        run: |
          LOGS=$(gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed 2>/dev/null | tail -50 || echo "Could not fetch logs")
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify CI Assistant
        run: |
          curl -s -X POST "${{ secrets.CI_ASSISTANT_URL }}/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CI_ASSISTANT_SECRET }}" \
            -d '{
              "repo": "${{ github.repository }}",
              "ref": "${{ github.event.workflow_run.head_branch }}",
              "event": "ci_failure",
              "run_id": ${{ github.event.workflow_run.id }},
              "details": ${{ toJSON(steps.logs.outputs.logs) }}
            }'

  notify-on-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify CI Assistant
        run: |
          curl -s -X POST "${{ secrets.CI_ASSISTANT_URL }}/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CI_ASSISTANT_SECRET }}" \
            -d '{
              "repo": "${{ github.repository }}",
              "ref": "${{ github.event.pull_request.head.ref }}",
              "event": "${{ github.event.action == 'opened' && 'pr_opened' || 'pr_updated' }}",
              "pr_number": ${{ github.event.pull_request.number }},
              "details": ${{ toJSON(github.event.pull_request.body) }}
            }'
